name: format

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates just clang-format python3
      - name: Run format check via just
        run: just format-check
