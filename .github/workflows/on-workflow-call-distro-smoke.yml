name: distro smoke

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: debian-trixie
            image: debian:trixie
          - id: fedora-latest
            image: fedora:latest
          - id: arch-latest
            image: archlinux:latest

    name: ${{ matrix.id }}
    container:
      image: ${{ matrix.image }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: base dependencies
        shell: bash
        run: |
          set -euo pipefail

          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends sudo ca-certificates curl git
            rm -rf /var/lib/apt/lists/*
          elif command -v dnf >/dev/null 2>&1; then
            dnf -y install sudo ca-certificates curl git
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm
            pacman -S --noconfirm --needed sudo ca-certificates curl git
          else
            echo "no supported package manager found" >&2
            exit 1
          fi

      - name: ci user
        shell: bash
        run: |
          set -euo pipefail
          useradd -m -s /bin/bash ci || true
          echo 'ci ALL=(ALL) NOPASSWD:ALL' >/etc/sudoers.d/ci
          chmod 0440 /etc/sudoers.d/ci

      - name: install
        shell: bash
        run: |
          set -euo pipefail
          sudo -u ci -H bash -lc "cd '${GITHUB_WORKSPACE}' && bash ./scripts/bootstrap"

      - name: verify install
        shell: bash
        run: |
          set -euo pipefail
          ci_home=$(getent passwd ci | cut -d: -f6)
          asryx_bin="${ci_home}/.local/bin/asryx"
          whisper_bin="${ci_home}/.local/bin/whisper-cli"

          test -x "${asryx_bin}"
          "${asryx_bin}" status | grep -qx 'idle'
          "${asryx_bin}" --model list >/dev/null

          test -x "${whisper_bin}"
          if ! "${whisper_bin}" --help >/dev/null 2>&1; then
            "${whisper_bin}" -h >/dev/null
          fi

      - name: uninstall
        shell: bash
        run: |
          set -euo pipefail
          sudo -u ci -H bash -lc "cd '${GITHUB_WORKSPACE}' && bash ./scripts/uninstall"

      - name: verify uninstall
        shell: bash
        run: |
          set -euo pipefail
          ci_home=$(getent passwd ci | cut -d: -f6)
          test ! -e "${ci_home}/.local/bin/asryx"
