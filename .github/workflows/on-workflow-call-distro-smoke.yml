name: distro-smoke

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # debian
          - id: debian-bookworm
            image: debian:bookworm
          - id: debian-trixie
            image: debian:trixie
          - id: debian-sid
            image: debian:sid

          # ubuntu family
          - id: ubuntu-24.04
            image: ubuntu:24.04
          - id: popos-22.04
            image: nycticoracs/pop_os:22.04

          # mint
          - id: mint-21.3
            image: linuxmintd/mint21.3-amd64:latest
          - id: mint-22.1
            image: linuxmintd/mint22.1-amd64:latest

          # fedora
          - id: fedora-40
            image: fedora:40

          # arch
          - id: arch-latest
            image: archlinux:latest

    name: smoke (${{ matrix.id }})

    container:
      image: ${{ matrix.image }}

    env:
      CI: "1"
      GIT_TERMINAL_PROMPT: "0"

    defaults:
      run:
        shell: bash

    steps:
      - name: install base tools
        run: |
          set -eux

          if command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              ca-certificates \
              curl \
              git \
              sudo \
              xz-utils \
              tar
            rm -rf /var/lib/apt/lists/*
          elif command -v dnf >/dev/null 2>&1; then
            dnf -y install \
              ca-certificates \
              curl \
              git \
              sudo \
              xz \
              tar
            dnf -y clean all || true
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Syu --noconfirm --needed \
              ca-certificates \
              curl \
              git \
              sudo \
              xz \
              tar \
              shadow
            pacman -Scc --noconfirm || true
          else
            echo "no supported package manager found"
            exit 1
          fi

      - name: create ci user (passwordless sudo)
        run: |
          set -eux

          if ! id ci >/dev/null 2>&1; then
            useradd -m -s /bin/bash ci
          fi

          if getent group sudo >/dev/null 2>&1; then
            usermod -aG sudo ci
          elif getent group wheel >/dev/null 2>&1; then
            usermod -aG wheel ci
          else
            groupadd sudo
            usermod -aG sudo ci
          fi

          echo "ci ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/ci
          chmod 0440 /etc/sudoers.d/ci

          mkdir -p /home/ci/.cache /home/ci/.local
          chown -R ci:ci /home/ci

      - name: sanity check sudo for ci
        run: |
          set -eux
          sudo -u ci -H bash -lc 'set -euo pipefail; sudo -n true'

      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: fix workspace perms for ci user
        run: |
          set -eux
          chown -R ci:ci "$GITHUB_WORKSPACE"

      - name: mark workspace as safe for git (ci user)
        run: |
          set -eux
          sudo -u ci -H bash -lc "set -euo pipefail; git config --global --add safe.directory \"$GITHUB_WORKSPACE\""

      - name: run install (smoke)
        run: |
          set -eux
          chmod +x ./install
          WS="$GITHUB_WORKSPACE"
          sudo -u ci -H bash -lc "set -euo pipefail; cd -- \"$WS\"; CI=1 ./install --yes"

      - name: verify install artifacts
        run: |
          set -eux
          test -x /home/ci/.local/bin/whisper-cli
          test -x /home/ci/.local/bin/asryx
          test -f /home/ci/.local/share/asryx/asryx.env
          test -f /home/ci/.local/share/asryx/install.manifest
          test -f /home/ci/.local/share/asryx/models/ggml-base.en.bin
          sudo -u ci -H bash -lc "set -euo pipefail; PATH=/home/ci/.local/bin:\$PATH whisper-cli --help >/dev/null"

      - name: run uninstall
        run: |
          set -eux
          chmod +x ./uninstall
          WS="$GITHUB_WORKSPACE"
          sudo -u ci -H bash -lc "set -euo pipefail; cd -- \"$WS\"; CI=1 ./uninstall --yes"

      - name: verify uninstall cleanup
        run: |
          set -eux
          test ! -e /home/ci/.local/bin/asryx
          test -e /home/ci/.local/bin/whisper-cli || true
          test ! -e /home/ci/.local/share/asryx/asryx.env
          test ! -e /home/ci/.local/share/asryx/install.manifest

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asryx-logs-${{ matrix.id }}
          path: |
            /home/ci/.cache/asryx
            /home/ci/.local/share/asryx
