name: shellcheck

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    container:
      image: debian:trixie

    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install dependencies
        run: |
          set -eux
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            just \
            shellcheck
          rm -rf /var/lib/apt/lists/*

      - name: run shellcheck via just
        run: |
          set -eux
          just s
