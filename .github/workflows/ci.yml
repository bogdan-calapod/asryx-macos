name: CI

on:
  push:
    branches:
      - main

  pull_request:

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    uses: ./.github/workflows/on-workflow-call-shell-check.yml

  format:
    uses: ./.github/workflows/on-workflow-call-format.yml

  lint:
    uses: ./.github/workflows/on-workflow-call-lint.yml

  build:
    uses: ./.github/workflows/on-workflow-call-build.yml

  test:
    uses: ./.github/workflows/on-workflow-call-test.yml

  runtime-safety:
    uses: ./.github/workflows/on-workflow-call-runtime-safety.yml

  distro-smoke:
    uses: ./.github/workflows/on-workflow-call-distro-smoke.yml
