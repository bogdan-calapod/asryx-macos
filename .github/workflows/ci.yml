name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**.txt"
      - "LICENSE"

  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**.txt"
      - "LICENSE"

concurrency:
  group: CI-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell:
    uses: ./.github/workflows/on-workflow-call-shell-check.yml

  distros:
    needs: shell
    uses: ./.github/workflows/on-workflow-call-distro-smoke.yml
