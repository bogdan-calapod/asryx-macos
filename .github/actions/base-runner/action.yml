name: base runner

description: install the fixed ubuntu ci toolchain

runs:
  using: composite
  steps:
    - name: install ci toolchain
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          ca-certificates \
          bash \
          git \
          curl \
          cmake \
          ninja-build \
          build-essential \
          clang \
          llvm \
          clang-format \
          clang-tidy \
          ccache \
          cppcheck \
          python3 \
          shellcheck \
          just \
          coreutils \
          pipewire \
          alsa-utils \
          wl-clipboard \
          xclip \
          libnotify-bin
        sudo rm -rf /var/lib/apt/lists/*
